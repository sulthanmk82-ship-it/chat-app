<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="chat-body">

<!-- ═══════════════════════════════════════════════
     APP LAYOUT
════════════════════════════════════════════════ -->
<div class="app">

  <!-- ── SIDEBAR ──────────────────────────────── -->
  <aside class="sidebar">

    <!-- Sidebar Header -->
    <div class="sidebar-header">
      <div class="my-profile">
        <div class="avatar avatar--me" id="myAvatar"></div>
        <div class="my-info">
          <span class="my-username" id="myUsername">Loading...</span>
          <span class="my-status">
            <span class="dot dot--online"></span> Online
          </span>
        </div>
      </div>
      <button class="btn-logout" id="logoutBtn" title="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- Search -->
    <div class="sidebar-search">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input type="text" id="searchInput" class="search-input" placeholder="Search users..."/>
    </div>

    <!-- Users label -->
    <div class="section-label">
      <span>USERS</span>
      <span class="online-count" id="onlineCount">0 online</span>
    </div>

    <!-- User List -->
    <ul class="user-list" id="userList">
      <li class="no-users">No other users yet...</li>
    </ul>

  </aside>

  <!-- ── CHAT PANEL ────────────────────────────── -->
  <main class="chat-panel" id="chatPanel">

    <!-- Empty state (before selecting a user) -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg width="64" height="64" viewBox="0 0 32 32" fill="none">
          <path d="M4 6C4 4.895 4.895 4 6 4H26C27.105 4 28 4.895 28 6V20C28 21.105 27.105 22 26 22H18L12 28V22H6C4.895 22 4 21.105 4 20V6Z" fill="url(#grad2)" opacity="0.3"/>
          <defs>
            <linearGradient id="grad2" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
              <stop stop-color="#4FACFE"/>
              <stop offset="1" stop-color="#7B61FF"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h2 class="empty-title">Pick a conversation</h2>
      <p class="empty-sub">Select a user from the sidebar to start chatting privately.</p>
    </div>

    <!-- Chat area (hidden until user selected) -->
    <div class="chat-area" id="chatArea" style="display:none;">

      <!-- Chat Header -->
      <div class="chat-header">
        <button class="btn-back" id="backBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="chat-user-info">
          <div class="avatar" id="chatAvatar"></div>
          <div>
            <div class="chat-username" id="chatUsername">—</div>
            <div class="chat-user-status" id="chatUserStatus">
              <span class="dot" id="chatStatusDot"></span>
              <span id="chatStatusText">Offline</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Messages Container -->
      <div class="messages-container" id="messagesContainer">
        <!-- Messages injected here -->
        <div class="no-messages" id="noMessages">
          <span>🔒</span>
          <p>This is the beginning of your private chat.</p>
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="typing-indicator" id="typingIndicator" style="display:none;">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
        <span class="typing-text" id="typingText">typing...</span>
      </div>

      <!-- Message Input -->
      <div class="message-input-area">
        <div class="input-row">
          <input
            type="text"
            id="messageInput"
            class="message-input"
            placeholder="Message..."
            maxlength="500"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="send-btn" id="sendBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>

    </div><!-- /chat-area -->
  </main>
</div><!-- /app -->

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
