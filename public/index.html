<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatWave — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <!-- Animated background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="auth-container">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M14 2C7.373 2 2 7.373 2 14c0 2.09.51 4.06 1.41 5.8L2 26l6.2-1.41C9.94 25.49 11.91 26 14 26c6.627 0 12-5.373 12-12S20.627 2 14 2z" fill="url(#logoGrad)"/>
          <defs>
            <linearGradient id="logoGrad" x1="2" y1="2" x2="26" y2="26">
              <stop offset="0%" stop-color="#4f8ef7"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="logo-text">ChatWave</span>
    </div>

    <!-- Card -->
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
      </div>

      <div class="auth-form-wrap">
        <!-- Title -->
        <div class="auth-header">
          <h1 class="auth-title" id="auth-title">Welcome back</h1>
          <p class="auth-sub" id="auth-sub">Sign in to continue chatting</p>
        </div>

        <!-- Error box -->
        <div class="error-box" id="error-box" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="#f87171" stroke-width="1.5"/>
            <path d="M8 5v3.5M8 11v.5" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span id="error-text"></span>
        </div>

        <!-- Fields -->
        <div class="field-group">
          <label class="field-label">Username</label>
          <div class="field-wrap">
            <svg class="field-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
              <circle cx="9" cy="6" r="3" stroke="#94a3b8" stroke-width="1.5"/>
              <path d="M3 15c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input type="text" id="username" class="field-input" placeholder="Enter your username" autocomplete="off" />
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Password</label>
          <div class="field-wrap">
            <svg class="field-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
              <rect x="3" y="8" width="12" height="8" rx="2" stroke="#94a3b8" stroke-width="1.5"/>
              <path d="M6 8V5.5a3 3 0 016 0V8" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input type="password" id="password" class="field-input" placeholder="Enter your password" />
            <button class="toggle-pw" onclick="togglePassword()" title="Toggle password">
              <svg id="eye-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
                <ellipse cx="9" cy="9" rx="7" ry="4" stroke="#94a3b8" stroke-width="1.5"/>
                <circle cx="9" cy="9" r="2" fill="#94a3b8"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button class="auth-btn" id="auth-btn" onclick="handleAuth()">
          <span id="btn-text">Sign In</span>
          <div class="btn-spinner" id="btn-spinner" style="display:none;"></div>
        </button>

        <p class="auth-switch">
          <span id="switch-text">Don't have an account?</span>
          <a href="#" id="switch-link" onclick="switchTab('register'); return false;">Create one</a>
        </p>
      </div>
    </div>

    <p class="auth-footer">Secure · Private · Real-time</p>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let currentMode = "login";

    // ── Tab switch ──────────────────────────────────────────────────────────
    function switchTab(mode) {
      currentMode = mode;
      const isLogin = mode === "login";

      document.getElementById("tab-login").classList.toggle("active", isLogin);
      document.getElementById("tab-register").classList.toggle("active", !isLogin);
      document.getElementById("auth-title").textContent = isLogin ? "Welcome back" : "Join ChatWave";
      document.getElementById("auth-sub").textContent = isLogin ? "Sign in to continue chatting" : "Create your account in seconds";
      document.getElementById("btn-text").textContent = isLogin ? "Sign In" : "Create Account";
      document.getElementById("switch-text").textContent = isLogin ? "Don't have an account?" : "Already have an account?";
      document.getElementById("switch-link").textContent = isLogin ? "Create one" : "Sign in";
      document.getElementById("switch-link").onclick = () => { switchTab(isLogin ? "register" : "login"); return false; };
      hideError();
    }

    // ── Toggle password ─────────────────────────────────────────────────────
    function togglePassword() {
      const pw = document.getElementById("password");
      pw.type = pw.type === "password" ? "text" : "password";
    }

    // ── Show/hide error ──────────────────────────────────────────────────────
    function showError(msg) {
      const box = document.getElementById("error-box");
      document.getElementById("error-text").textContent = msg;
      box.style.display = "flex";
      box.classList.add("shake");
      setTimeout(() => box.classList.remove("shake"), 400);
    }

    function hideError() {
      document.getElementById("error-box").style.display = "none";
    }

    // ── Auth submit ──────────────────────────────────────────────────────────
    function handleAuth() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      hideError();

      if (!username) return showError("Please enter a username.");
      if (!password) return showError("Please enter a password.");

      setLoading(true);

      if (currentMode === "login") {
        socket.emit("login", { username, password });
      } else {
        socket.emit("register", { username, password });
      }
    }

    function setLoading(on) {
      document.getElementById("btn-text").style.display = on ? "none" : "inline";
      document.getElementById("btn-spinner").style.display = on ? "block" : "none";
      document.getElementById("auth-btn").disabled = on;
    }

    // ── Socket responses ─────────────────────────────────────────────────────
    socket.on("auth_success", ({ username }) => {
      if (currentMode === "register") {
        // Auto-login after register
        socket.emit("login", {
          username,
          password: document.getElementById("password").value,
        });
        return;
      }
      sessionStorage.setItem("chatUsername", username);
      window.location.href = "/chat.html";
    });

    socket.on("auth_error", (msg) => {
      setLoading(false);
      showError(msg);
    });

    // ── Enter key ────────────────────────────────────────────────────────────
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleAuth();
    });

    // ── Check already logged in ──────────────────────────────────────────────
    if (sessionStorage.getItem("chatUsername")) {
      window.location.href = "/chat.html";
    }
  </script>
</body>
</html>
